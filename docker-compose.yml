# One full OPERATOR node: watchers + signer + recon, sharing one built image.
# Each trusted operator runs this on their own hardware with their own .env.
# The coordinator runs separately (docker-compose.coordinator.yml) and may be
# hosted by any one operator or rotated.

services:
  viz-watcher:
    build: .
    image: viz-gateway:latest
    env_file: .env
    environment:
      SERVICE: viz-watcher
    restart: unless-stopped
    volumes:
      - gw-data:/app/data

  # TON burn watcher (the package was renamed ton-watcher -> gram-watcher; SERVICE and the
  # entrypoint case must use the real name or the container dies on MODULE_NOT_FOUND — BH3).
  gram-watcher:
    image: viz-gateway:latest
    env_file: .env
    environment:
      SERVICE: gram-watcher
    restart: unless-stopped
    volumes:
      - gw-data:/app/data
    depends_on: [viz-watcher]

  signer:
    image: viz-gateway:latest
    env_file: .env
    environment:
      SERVICE: signer
      SIGNER_LISTEN: 0.0.0.0:8090
    restart: unless-stopped
    # Keep the signer off the public internet; expose only on the operator LAN.
    expose: ["8090"]
    volumes:
      - gw-data:/app/data
    depends_on: [viz-watcher]

  recon:
    image: viz-gateway:latest
    env_file: .env
    environment:
      SERVICE: recon
    restart: unless-stopped
    depends_on: [viz-watcher, gram-watcher]

  # For a solo / bootstrap operator the coordinator runs in the same stack, so
  # `docker compose up` is a complete working bridge. In a multi-operator
  # federation, run the coordinator separately (docker-compose.coordinator.yml)
  # and point COORDINATOR_URL / SIGNER_ENDPOINTS across hosts.
  coordinator:
    image: viz-gateway:latest
    env_file: .env
    environment:
      SERVICE: coordinator
      COORDINATOR_LISTEN: 0.0.0.0:8080
      SIGNER_ENDPOINTS: http://signer:8090
    restart: unless-stopped
    volumes:
      - gw-data:/app/data
    depends_on: [signer]

  # Drains QUEUED outbox rows to the coordinator with retries. Without this service the
  # watchers enqueue peg-ins/outs but nothing ever delivers them — QUEUED rows sit forever
  # and no mint/release happens (BH2). Shares the store volume; talks to the coordinator.
  dispatcher:
    image: viz-gateway:latest
    env_file: .env
    environment:
      SERVICE: dispatcher
      COORDINATOR_URL: http://coordinator:8080
    restart: unless-stopped
    volumes:
      - gw-data:/app/data
    depends_on: [coordinator]

volumes:
  gw-data:
