# One full OPERATOR node: watchers + signer + recon, sharing one built image.
# Each trusted operator runs this on their own hardware with their own .env.
# The coordinator runs separately (docker-compose.coordinator.yml) and may be
# hosted by any one operator or rotated.

services:
  viz-watcher:
    build: .
    image: viz-gateway:latest
    env_file: .env
    environment:
      SERVICE: viz-watcher
    restart: unless-stopped
    volumes:
      - gw-data:/app/data

  ton-watcher:
    image: viz-gateway:latest
    env_file: .env
    environment:
      SERVICE: ton-watcher
    restart: unless-stopped
    volumes:
      - gw-data:/app/data
    depends_on: [viz-watcher]

  signer:
    image: viz-gateway:latest
    env_file: .env
    environment:
      SERVICE: signer
      SIGNER_LISTEN: 0.0.0.0:8090
    restart: unless-stopped
    # Keep the signer off the public internet; expose only on the operator LAN.
    expose: ["8090"]
    volumes:
      - gw-data:/app/data
    depends_on: [viz-watcher]

  recon:
    image: viz-gateway:latest
    env_file: .env
    environment:
      SERVICE: recon
    restart: unless-stopped
    depends_on: [viz-watcher, ton-watcher]

  # For a solo / bootstrap operator the coordinator runs in the same stack, so
  # `docker compose up` is a complete working bridge. In a multi-operator
  # federation, run the coordinator separately (docker-compose.coordinator.yml)
  # and point COORDINATOR_URL / SIGNER_ENDPOINTS across hosts.
  coordinator:
    image: viz-gateway:latest
    env_file: .env
    environment:
      SERVICE: coordinator
      COORDINATOR_LISTEN: 0.0.0.0:8080
      SIGNER_ENDPOINTS: http://signer:8090
    restart: unless-stopped
    volumes:
      - gw-data:/app/data
    depends_on: [signer]

volumes:
  gw-data:
