name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    env:
      # Collect V8 coverage across every node process in the job (the unit suite AND the
      # offline verify spikes, which exercise most of the write-path/orchestration code).
      # c8 aggregates the raw output and remaps it to the TS sources in the report step.
      NODE_V8_COVERAGE: coverage/tmp
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc project references)
        run: npm run build

      # All verification spikes are offline (no chain RPC): threshold math,
      # VIZ partial-signature merge, TON transfer_notification parser, the
      # write-path signer, and the contract building blocks.
      - name: Verify
        run: npm run verify

      # BM1: the node:test unit suites (packages/*/test) use extensionless imports, so `node --test`
      # can't run them raw. Compile them via tsconfig.test.json to dist-test/, then run. The build
      # above already produced the dist/ the compiled tests resolve @gateway/* against.
      # run-unit-tests.mjs discovers files recursively and fails loudly on zero matches (issue #39)
      # so a broken outDir/glob can't silently no-op the whole tier while CI stays green.
      - name: Unit tests (node:test)
        run: npx tsc -p tsconfig.test.json && node tools/run-unit-tests.mjs

      # Regression guard for the peg-in deep-link builder (site/app.js updatePegInDeeplink):
      # feeds XSS/injection payloads through the exact URL-construction logic and asserts every
      # produced href stays inert (https scheme, everything encoded, no injected query params).
      # Standalone node script — no build needed; exits non-zero on any breakout.
      - name: Deep-link XSS proof
        run: node tools/deeplink-xss-proof.cjs

      # Aggregate the V8 coverage written by the two steps above and remap it (via source
      # maps) onto packages/*/src/*.ts. Config in .c8rc.json (include/exclude, remap).
      - name: Coverage report (lcov)
        run: npx c8 report --reporter=lcov --reporter=text-summary

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          # A Codecov outage must never fail a security-critical bridge's CI.
          fail_ci_if_error: false
